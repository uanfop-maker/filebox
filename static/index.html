<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FileBox</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--border:#2a2d3a;
  --accent:#7c6af7;--accent2:#5b52e0;--text:#e4e6f0;--muted:#888;
  --red:#e05252;--green:#52e07c;--radius:12px;--font:'Inter',system-ui,sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column}

/* ── login ── */
#login-page{display:flex;align-items:center;justify-content:center;flex:1;padding:20px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px 36px;width:100%;max-width:360px;text-align:center}
.login-card h1{font-size:1.8rem;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
.login-card p{color:var(--muted);font-size:.88rem;margin-bottom:28px}
.code-input{width:100%;padding:14px 16px;font-size:1.5rem;letter-spacing:.3em;text-align:center;background:#12151e;border:2px solid var(--border);border-radius:8px;color:var(--text);outline:none;transition:.15s}
.code-input:focus{border-color:var(--accent)}
.login-btn{margin-top:14px;width:100%;padding:13px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:.15s}
.login-btn:hover{background:var(--accent2)}
.login-err{margin-top:10px;color:var(--red);font-size:.85rem;min-height:18px}

/* ── app ── */
#app-page{display:none;flex-direction:column;flex:1}
header{display:flex;align-items:center;gap:12px;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface)}
header h1{font-size:1.1rem;font-weight:700;flex:1}
.storage-badge{font-size:.8rem;color:var(--muted)}
.logout-btn{padding:7px 16px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text);cursor:pointer;font-size:.85rem}
.logout-btn:hover{background:var(--border)}
main{flex:1;padding:24px;max-width:860px;width:100%;margin:0 auto}

/* drop zone */
.dropzone{border:2px dashed var(--border);border-radius:var(--radius);padding:36px 20px;text-align:center;cursor:pointer;transition:.15s;margin-bottom:24px}
.dropzone:hover,.dropzone.drag{border-color:var(--accent);background:#1e2030}
.dropzone p{color:var(--muted);font-size:.9rem}
.dropzone strong{color:var(--accent)}
#file-input{display:none}
.upload-progress{margin-top:10px;font-size:.83rem;color:var(--accent);display:none}

/* file list */
.section-title{font-size:.8rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.file-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;transition:.15s}
.file-item:hover{border-color:#3a3d50}
.file-icon{font-size:1.4rem;width:32px;text-align:center;flex-shrink:0}
.file-info{flex:1;min-width:0}
.file-name{font-size:.92rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-meta{font-size:.78rem;color:var(--muted);margin-top:2px}
.file-actions{display:flex;gap:8px;flex-shrink:0}
.btn-icon{padding:6px 10px;border-radius:7px;border:none;cursor:pointer;font-size:.8rem;font-weight:600;transition:.15s}
.btn-dl{background:#1f3040;color:#5ab8ff}
.btn-dl:hover{background:#26405a}
.btn-del{background:#3d1a1a;color:var(--red)}
.btn-del:hover{background:#55201f}
.empty{color:var(--muted);font-size:.88rem;text-align:center;padding:32px 0}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-page">
  <div class="login-card">
    <h1>🔐 FileBox</h1>
    <p>輸入 Authenticator 驗證碼</p>
    <input id="code" class="code-input" type="text" inputmode="numeric" maxlength="6" placeholder="000000" autocomplete="one-time-code">
    <button class="login-btn" onclick="doLogin()">驗證</button>
    <div id="login-err" class="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app-page">
  <header>
    <h1>📦 FileBox</h1>
    <span class="storage-badge" id="storage-info"></span>
    <button class="logout-btn" onclick="doLogout()">登出</button>
  </header>
  <main>
    <div class="dropzone" id="dropzone" onclick="document.getElementById('file-input').click()">
      <p>拖曳檔案到這裡，或 <strong>點擊選擇</strong></p>
      <p id="upload-progress" class="upload-progress"></p>
    </div>
    <input type="file" id="file-input" multiple onchange="uploadFiles(this.files)">
    <div class="section-title">檔案列表</div>
    <div id="file-list"></div>
  </main>
</div>

<script>
const $ = id => document.getElementById(id);

// ── auth ─────────────────────────────────────────────────
async function init() {
  const r = await fetch('/auth/check');
  const d = await r.json();
  if (d.ok) showApp();
  else showLogin();
}

function showLogin() {
  $('login-page').style.display = 'flex';
  $('app-page').style.display = 'none';
  setTimeout(() => $('code').focus(), 100);
}

function showApp() {
  $('login-page').style.display = 'none';
  $('app-page').style.display = 'flex';
  loadFiles();
  loadStorage();
}

async function doLogin() {
  const code = $('code').value.trim();
  $('login-err').textContent = '';
  try {
    const r = await fetch('/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({code})
    });
    if (r.ok) { showApp(); }
    else { $('login-err').textContent = '驗證碼錯誤，請重試'; $('code').value = ''; }
  } catch { $('login-err').textContent = '網路錯誤'; }
}

async function doLogout() {
  await fetch('/auth/logout', {method:'POST'});
  showLogin();
}

$('code').addEventListener('input', e => {
  if (e.target.value.length === 6) doLogin();
});
$('code').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });

// ── files ─────────────────────────────────────────────────
async function loadFiles() {
  const r = await fetch('/api/files');
  if (!r.ok) { showLogin(); return; }
  const files = await r.json();
  const list = $('file-list');
  if (!files.length) {
    list.innerHTML = '<div class="empty">尚無檔案</div>';
    return;
  }
  list.innerHTML = files.map(f => `
    <div class="file-item" id="fi-${f.id}">
      <div class="file-icon">${fileIcon(f.name)}</div>
      <div class="file-info">
        <div class="file-name" title="${esc(f.name)}">${esc(f.name)}</div>
        <div class="file-meta">${fmtSize(f.size)} · ${fmtDate(f.ts)}</div>
      </div>
      <div class="file-actions">
        <button class="btn-icon btn-dl" onclick="dlFile('${f.id}','${esc(f.name)}')">下載</button>
        <button class="btn-icon btn-del" onclick="delFile('${f.id}')">刪除</button>
      </div>
    </div>
  `).join('');
}

async function loadStorage() {
  const r = await fetch('/api/storage');
  if (!r.ok) return;
  const d = await r.json();
  $('storage-info').textContent = `已使用 ${fmtSize(d.used_bytes)}`;
}

function dlFile(id, name) {
  const a = document.createElement('a');
  a.href = `/api/files/${id}`;
  a.download = name;
  a.click();
}

async function delFile(id) {
  if (!confirm('確定刪除？')) return;
  const r = await fetch(`/api/files/${id}`, {method:'DELETE'});
  if (r.ok) { document.getElementById(`fi-${id}`)?.remove(); loadStorage(); }
}

// ── upload ─────────────────────────────────────────────────
async function uploadFiles(files) {
  if (!files || !files.length) return;
  const prog = $('upload-progress');
  prog.style.display = 'block';
  for (let i = 0; i < files.length; i++) {
    const f = files[i];
    prog.textContent = `上傳中 ${i+1}/${files.length}：${f.name}`;
    const fd = new FormData();
    fd.append('file', f);
    const r = await fetch('/api/files', {method:'POST', body:fd});
    if (!r.ok) { prog.textContent = `上傳失敗：${f.name}`; await new Promise(r=>setTimeout(r,2000)); }
  }
  prog.style.display = 'none';
  $('file-input').value = '';
  loadFiles();
  loadStorage();
}

// drag-drop
const dz = $('dropzone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag');
  uploadFiles(e.dataTransfer.files);
});

// ── utils ──────────────────────────────────────────────────
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtSize(b){
  if(b<1024) return b+'B';
  if(b<1048576) return (b/1024).toFixed(1)+'KB';
  if(b<1073741824) return (b/1048576).toFixed(1)+'MB';
  return (b/1073741824).toFixed(2)+'GB';
}
function fmtDate(ts){ return new Date(ts).toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}); }
function fileIcon(name){
  const ext = name.split('.').pop().toLowerCase();
  const m = {jpg:'🖼️',jpeg:'🖼️',png:'🖼️',gif:'🖼️',webp:'🖼️',svg:'🖼️',
    mp4:'🎬',mov:'🎬',avi:'🎬',mkv:'🎬',webm:'🎬',
    mp3:'🎵',wav:'🎵',flac:'🎵',m4a:'🎵',
    pdf:'📄',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',ppt:'📊',pptx:'📊',
    zip:'📦',rar:'📦','7z':'📦',tar:'📦',gz:'📦',
    py:'💻',js:'💻',ts:'💻',html:'💻',css:'💻',json:'💻',sh:'💻',
    txt:'📃',md:'📃',csv:'📃'};
  return m[ext]||'📎';
}

init();
</script>
</body>
</html>
